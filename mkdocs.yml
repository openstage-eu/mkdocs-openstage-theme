site_name: openstage theme
site_url: https://openstage-eu.github.io/mkdocs-openstage-theme/
site_description: A clean, book-like MkDocs theme with sidebar navigation, search, and dark mode

theme:
  name: openstage
  color_mode: light
  color_toggle: true
  nav_links:
    - title: GitHub
      url: https://github.com/openstage-eu/mkdocs-openstage-theme
  site_footer: "Built with openstage theme for MkDocs"

nav:
  - Home: index.md
  - Installation: installation.md
  - Configuration: configuration.md
  - Overview: overview.md
  - Advanced: advanced.md

plugins:
  - search
  - llmstxt:
      sections:
        "Documentation":
          - installation.md: Installation instructions
          - configuration.md: All configuration options
          - overview.md: Architecture and design overview
          - advanced.md: Advanced usage and customization

markdown_extensions:
  - toc:
      permalink: true
  - admonition
