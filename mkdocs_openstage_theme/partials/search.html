{#
  Search input and results container.
  MkDocs built-in search binds to these specific IDs automatically.
#}

<div class="os-search">
  <div class="os-search-input-wrap">
    <svg class="os-search-icon" viewBox="0 0 24 24" width="16" height="16">
      <circle cx="11" cy="11" r="7" fill="none" stroke="currentColor" stroke-width="2"/>
      <path d="M16 16l4.5 4.5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    </svg>
    <input type="text"
           id="mkdocs-search-query"
           class="os-search-input"
           placeholder="Search..."
           aria-label="Search"
           autocomplete="off">
  </div>
  <div id="mkdocs-search-results" class="os-search-results"></div>
</div>
